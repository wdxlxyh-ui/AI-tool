<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · AI 工具集</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/",
    "postprocessing": "https://unpkg.com/postprocessing@6.36.3/build/index.js"
  }
}
</script>
<style>
:root{
  --bg:#0f1117;
  --accent:#4b8cf7;
  --accent-dim:rgba(75,140,247,.1);
  --text:#e1e4e8;
  --text-secondary:#8b8fa3;
  --text-dim:#555a6a;
  --danger:#f85149;
}
*,*::before,*::after{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

.login-page{ height:100vh; width:100%; position:relative; display:flex; align-items:center; justify-content:center; }
.login-bg{ position:fixed; inset:0; z-index:0; overflow:hidden; }
.login-bg canvas{ width:100%; height:100%; display:block; }
.login-bg::after{ content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(15,17,23,.4) 0%,rgba(15,17,23,.7) 60%,var(--bg) 100%); pointer-events:none; }

.login-card{
  position:relative; z-index:1; width:400px; max-width:92vw;
  background:rgba(26,29,39,.85); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.06); border-radius:12px;
  padding:40px 36px 32px; box-shadow:0 8px 40px rgba(0,0,0,.35);
}
.login-header{ text-align:center; margin-bottom:32px; }
.login-header .logo{ width:48px; height:48px; border-radius:11px; background:var(--accent-dim); color:var(--accent); display:inline-flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; margin-bottom:10px; }
.login-header h1{ font-size:20px; font-weight:600; color:var(--text); }
.login-header p{ font-size:12px; color:var(--text-dim); margin-top:4px; }

.form-group{ margin-bottom:18px; }
.form-group label{ display:block; font-size:12px; color:var(--text-secondary); margin-bottom:5px; }
.form-group input{ width:100%; padding:10px 14px; border-radius:6px; background:rgba(34,37,48,.6); border:1px solid rgba(255,255,255,.06); color:var(--text); font-size:13px; outline:none; transition:border-color .15s ease; }
.form-group input:focus{ border-color:var(--accent); }
.form-group input::placeholder{ color:var(--text-dim); }

.btn{ display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 20px; border-radius:6px; font-size:13px; cursor:pointer; transition:all .15s ease; border:1px solid transparent; text-decoration:none; width:100%; }
.btn-primary{ background:var(--accent); color:#fff; }
.btn-primary:hover{ opacity:.9; }
.btn-outline{ background:transparent; color:var(--text-secondary); border-color:rgba(255,255,255,.08); }
.btn-outline:hover{ background:rgba(255,255,255,.04); color:var(--text); }
.login-actions{ margin-top:26px; display:flex; flex-direction:column; gap:8px; }
.login-footer{ text-align:center; margin-top:16px; font-size:11px; color:var(--text-dim); }
.login-footer a{ color:var(--accent); text-decoration:none; }
.login-footer a:hover{ text-decoration:underline; }

.flash-msg{ padding:8px 14px; border-radius:6px; font-size:12px; margin-bottom:14px; background:rgba(26,29,39,.6); border:1px solid rgba(255,255,255,.06); }
.flash-msg.error{ border-color:rgba(248,81,73,.25); color:var(--danger); }
.flash-msg.success{ border-color:rgba(63,185,80,.25); color:#3fb950; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-bg"><canvas id="gc"></canvas></div>
  <div class="login-card">
    <div class="login-header">
      <div class="logo">AI</div>
      <h1>AI 工具集</h1>
      <p>边缘计算管理平台</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for category, message in messages %}
    <div class="flash-msg {{ category }}">{{ message }}</div>
    {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group"><label>用户名</label><input type="text" name="username" placeholder="请输入用户名" value="admin" required></div>
      <div class="form-group"><label>密码</label><input type="password" name="password" placeholder="请输入密码" required></div>
      <div class="login-actions">
        <button type="submit" class="btn btn-primary">登 录</button>
        <a class="btn btn-outline" href="{{ url_for('auth.register') }}">注册账号</a>
      </div>
    </form>
    <div class="login-footer"><a href="{{ url_for('auth.register') }}">注册账号</a></div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer, EffectPass, RenderPass, BloomEffect, ChromaticAberrationEffect } from 'postprocessing';

function srgbColor(hex) {
  const c = new THREE.Color(hex);
  return c.clone().convertSRGBToLinear();
}

const vert = `varying vec2 vUv;
void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`;

const frag = `precision highp float;
uniform vec3 iResolution; uniform float iTime;
uniform vec2 uSkew; uniform float uTilt; uniform float uYaw;
uniform float uLineThickness; uniform vec3 uLinesColor; uniform vec3 uScanColor;
uniform float uGridScale; uniform float uLineStyle; uniform float uLineJitter;
uniform float uScanOpacity; uniform float uScanDirection;
uniform float uNoise; uniform float uBloomOpacity;
uniform float uScanGlow; uniform float uScanSoftness; uniform float uPhaseTaper;
uniform float uScanDuration; uniform float uScanDelay;
varying vec2 vUv;

float smoother01(float a,float b,float x){float t=clamp((x-a)/max(1e-5,(b-a)),0.,1.);return t*t*t*(t*(t*6.-15.)+10.);}

void mainImage(out vec4 o,in vec2 fC){
  vec2 p=(2.*fC-iResolution.xy)/iResolution.y;
  vec3 ro=vec3(0.),rd=normalize(vec3(p,2.));
  float cR=cos(uTilt),sR=sin(uTilt);rd.xy=mat2(cR,-sR,sR,cR)*rd.xy;
  float cY=cos(uYaw),sY=sin(uYaw);rd.xz=mat2(cY,-sY,sY,cY)*rd.xz;
  vec2 sk=clamp(uSkew,vec2(-.7),vec2(.7));rd.xy+=sk*rd.z;
  float minT=1e20,gs=max(1e-5,uGridScale);vec2 gU=vec2(0.);float hY=1.;
  for(int i=0;i<4;i++){
    float iY=float(i<2);float po=mix(-.2,.2,float(i))*iY+mix(-.5,.5,float(i-2))*(1.-iY);
    float n=po-(iY*ro.y+(1.-iY)*ro.x);float d=iY*rd.y+(1.-iY)*rd.x;
    float t=n/d;vec3 h=ro+rd*t;h.xy+=sk*.15*smoothstep(0.,3.,h.z);
    bool u=t>0.&&t<minT;gU=u?mix(h.zy,h.xz,iY)/gs:gU;minT=u?t:minT;hY=u?iY:hY;
  }
  vec3 hit=ro+rd*minT;float dist=length(hit-ro);
  float ja=clamp(uLineJitter,0.,1.);
  if(ja>0.){vec2 j=vec2(sin(gU.y*2.7+iTime*1.8),cos(gU.x*2.3-iTime*1.6))*(.15*ja);gU+=j;}
  float fx=fract(gU.x),fy=fract(gU.y);
  float ax=min(fx,1.-fx),ay=min(fy,1.-fy);
  float wx=fwidth(gU.x),wy=fwidth(gU.y),hp=max(0.,uLineThickness)*.5;
  float tx=hp*wx,ty=hp*wy,aax=wx,aay=wy;
  float lX=1.-smoothstep(tx,tx+aax,ax),lY=1.-smoothstep(ty,ty+aay,ay);
  float pM=max(lX,lY);
  vec2 gU2=(hY>.5?hit.xz:hit.zy)/gs;
  if(ja>0.){vec2 j2=vec2(cos(gU2.y*2.1-iTime*1.4),sin(gU2.x*2.5+iTime*1.7))*(.15*ja);gU2+=j2;}
  float fx2=fract(gU2.x),fy2=fract(gU2.y);
  float ax2=min(fx2,1.-fx2),ay2=min(fy2,1.-fy2);
  float wx2=fwidth(gU2.x),wy2=fwidth(gU2.y);
  float tx2=hp*wx2,ty2=hp*wy2,aax2=wx2,aay2=wy2;
  float lX2=1.-smoothstep(tx2,tx2+aax2,ax2),lY2=1.-smoothstep(ty2,ty2+aay2,ay2);
  float eX=min(abs(hit.x+.5),abs(hit.x-.5)),eY=min(abs(hit.y+.2),abs(hit.y-.2));
  float eD=mix(eY,eX,hY),eG=1.-smoothstep(gs*.5,gs*2.,eD);
  float aM=max(lX2,lY2)*eG,lM=max(pM,aM);
  float fade=exp(-dist*2.);
  float dur=max(.05,uScanDuration),del=max(0.,uScanDelay);
  float cycle=dur+del,tCycle=mod(iTime,cycle);
  float ph=clamp((tCycle-del)/dur,0.,1.);
  if(uScanDirection>.5&&uScanDirection<1.5)ph=1.-ph;
  else if(uScanDirection>1.5){float t2=mod(max(0.,iTime-del),2.*dur);ph=(t2<dur)?(t2/dur):(1.-(t2-dur)/dur);}
  float sZ=ph*2.,dz=abs(hit.z-sZ);
  float ws=max(.1,uScanGlow),sg=max(.001,.18*ws*uScanSoftness),sA=sg*2.;
  float lB=exp(-.5*dz*dz/(sg*sg)),lA=exp(-.5*dz*dz/(sA*sA))*.25;
  float ta=clamp(uPhaseTaper,0.,.49);
  float hF=smoother01(0.,ta,ph),tF=1.-smoother01(1.-ta,1.,ph),pW=hF*tF;
  float cP=lB*pW*clamp(uScanOpacity,0.,1.),cA=lA*pW*clamp(uScanOpacity,0.,1.);
  float lV=lM;vec3 gC=uLinesColor*lV*fade,sC=uScanColor*cP,sA2=uScanColor*cA;
  vec3 col=gC+sC+sA2;
  float n=fract(sin(dot(gl_FragCoord.xy+vec2(iTime*123.4),vec2(12.9898,78.233)))*43758.5453);
  col+=(n-.5)*uNoise;col=clamp(col,0.,1.);
  float gx=1.-smoothstep(tx*2.,tx*2.+aax*2.,ax),gy=1.-smoothstep(ty*2.,ty*2.+aay*2.,ay);
  float halo=max(gx,gy)*fade;
  lV=max(lV,halo*clamp(uBloomOpacity,0.,1.));
  o=vec4(col,clamp(lV,0.,1.));
}
void main(){vec4 c;mainImage(c,vUv*iResolution.xy);gl_FragColor=c;}`;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.NoToneMapping;
renderer.autoClear = false;
renderer.setClearColor(0x000000, 0);
renderer.domElement.style.cssText = 'position:fixed;inset:0;width:100%;height:100%';
document.querySelector('.login-bg').prepend(renderer.domElement);

const uniforms = {
  iResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, renderer.getPixelRatio()) },
  iTime: { value: 0 },
  uSkew: { value: new THREE.Vector2(0, 0) },
  uTilt: { value: 0 },
  uYaw: { value: 0 },
  uLineThickness: { value: 0.8 },
  uLinesColor: { value: srgbColor('#3D6CAA') },
  uScanColor: { value: srgbColor('#9EB1FF') },
  uGridScale: { value: 0.12 },
  uLineStyle: { value: 0 },
  uLineJitter: { value: 0.08 },
  uScanOpacity: { value: 0.4 },
  uNoise: { value: 0.008 },
  uBloomOpacity: { value: 0.55 },
  uScanGlow: { value: 0.5 },
  uScanSoftness: { value: 2 },
  uPhaseTaper: { value: 0.85 },
  uScanDuration: { value: 1.2 },
  uScanDelay: { value: 0.6 },
  uScanDirection: { value: 2 }
};

const material = new THREE.ShaderMaterial({
  uniforms, vertexShader: vert, fragmentShader: frag,
  transparent: true, depthWrite: false, depthTest: false
});
const scene = new THREE.Scene();
const quadCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, quadCam));

const bloom = new BloomEffect({ intensity: 1.0, luminanceThreshold: 0, luminanceSmoothing: 0 });
bloom.blendMode.opacity.value = 0.55;
const chroma = new ChromaticAberrationEffect({ offset: new THREE.Vector2(0.0015, 0.0015), radialModulation: true, modulationOffset: 0 });
const effectPass = new EffectPass(quadCam, bloom, chroma);
effectPass.renderToScreen = true;
composer.addPass(effectPass);

// Mouse tracking with smooth damping
function smoothDampVec2(cr, tg, vl, st, ms, dt) {
  const out = cr.clone(); st = Math.max(0.0001, st);
  const om = 2 / st, x = om * dt, ex = 1 / (1 + x + 0.48 * x * x + 0.235 * x * x * x);
  let ch = cr.clone().sub(tg); const ot = tg.clone(), mc = ms * st;
  if (ch.length() > mc) ch.setLength(mc); tg = cr.clone().sub(ch);
  const tmp = vl.clone().addScaledVector(ch, om).multiplyScalar(dt);
  vl.sub(tmp.clone().multiplyScalar(om)); vl.multiplyScalar(ex);
  out.copy(tg.clone().add(ch.add(tmp).multiplyScalar(ex)));
  if (ot.clone().sub(cr).dot(out.clone().sub(ot)) > 0) { out.copy(ot); vl.set(0, 0); }
  return out;
}
function smoothDampFloat(cr, tg, vl, st, ms, dt) {
  st = Math.max(0.0001, st); const om = 2 / st, x = om * dt, ex = 1 / (1 + x + 0.48 * x * x + 0.235 * x * x * x);
  let ch = cr - tg; const ot = tg, mc = ms * st;
  ch = Math.sign(ch) * Math.min(Math.abs(ch), mc); tg = cr - ch;
  const tmp = (vl.v + om * ch) * dt; vl.v = (vl.v - om * tmp) * ex;
  let o = tg + (ch + tmp) * ex;
  if ((ot - cr) * (o - ot) > 0) { o = ot; vl.v = 0; }
  return { value: o, v: vl.v };
}

const lookTarget = new THREE.Vector2(0, 0), lookCurrent = new THREE.Vector2(0, 0), lookVel = new THREE.Vector2(0, 0);
let tiltTarget = 0, tiltCurrent = 0, tiltVel = { v: 0 }, yawTarget = 0, yawCurrent = 0, yawVel = { v: 0 };
const skewScale = 0.2, tiltScale = 0.3, yawScale = 0.28, smoothTime = 0.2, yBoost = 1.6;
const SM = { value: 0.55 };

document.addEventListener('mousemove', e => {
  lookTarget.set((e.clientX / innerWidth) * 2 - 1, (e.clientY / innerHeight) * 2 - 1);
});

addEventListener('resize', () => {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  uniforms.iResolution.value.set(w, h, renderer.getPixelRatio());
  composer.setSize(w, h);
});

let last = performance.now();
(function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.max(0, Math.min(0.1, (now - last) / 1000)); last = now;
  lookCurrent.copy(smoothDampVec2(lookCurrent, lookTarget, lookVel, smoothTime, 1/0, dt));
  const ts = smoothDampFloat(tiltCurrent, tiltTarget, tiltVel, smoothTime, 1/0, dt);
  tiltCurrent = ts.value; tiltVel.v = ts.v;
  const ys = smoothDampFloat(yawCurrent, yawTarget, yawVel, smoothTime, 1/0, dt);
  yawCurrent = ys.value; yawVel.v = ys.v;
  uniforms.uSkew.value.set(lookCurrent.x * skewScale, -lookCurrent.y * yBoost * skewScale);
  uniforms.uTilt.value = tiltCurrent * tiltScale;
  uniforms.uYaw.value = THREE.MathUtils.clamp(yawCurrent * yawScale, -0.6, 0.6);
  uniforms.iTime.value = now / 1000;
  renderer.clear(true, true, true);
  composer.render(dt);
})(performance.now());
</script>
</body>
</html>
